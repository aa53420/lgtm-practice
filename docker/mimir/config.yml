# 멀티테넌시 비활성화
# → 기본적으로 Mimir는 테넌트 ID(X-Scope-OrgID)가 필요함
multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: info

blocks_storage:
  # 메트릭 장기 저장소 backend
  # → 운영에서는 보통 S3/MinIO 사용
  # → 여기서는 로컬 filesystem 사용 (개발용)
  backend: filesystem

  filesystem:
    # 실제 블록 데이터 저장 위치
    # → 압축된 TSDB 블록이 여기에 저장됨
    dir: /data/tsdb

  tsdb:
    # 인메모리 → 디스크로 flush되기 전 임시 저장 위치
    # (ingester가 사용하는 로컬 TSDB)
    dir: /data/ingester

compactor:
  # TSDB 블록을 병합(compaction)하는 컴포넌트의 작업 디렉토리
  # → 작은 블록들을 큰 블록으로 합쳐서 성능/효율 개선
  data_dir: /data/compactor

store_gateway:
  sharding_ring:
    # store-gateway 복제 개수
    # → 싱글 노드라서 1로 설정
    replication_factor: 1

distributor:
  ring:
    # 현재 인스턴스 주소
    # → 클러스터 구성 시 노드 간 통신에 사용
    instance_addr: 127.0.0.1

    kvstore:
      # 링 상태를 저장하는 방식
      # → memberlist = gossip 기반 (외부 KV 필요 없음)
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1

    # 데이터 복제 개수
    # → 단일 노드이므로 1
    replication_factor: 1

    kvstore:
      store: memberlist
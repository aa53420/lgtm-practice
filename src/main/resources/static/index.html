<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }

    .field { margin-bottom: 1.25rem; }

    select, textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.6rem 0.75rem;
      transition: border-color 0.15s;
      outline: none;
    }

    select:focus, textarea:focus { border-color: #6366f1; }

    textarea { resize: vertical; min-height: 100px; font-family: inherit; line-height: 1.5; }

    .level-row {
      display: flex;
      gap: 0.5rem;
    }

    .level-btn {
      flex: 1;
      padding: 0.5rem 0;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: #64748b;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .level-btn:hover { border-color: #6366f1; color: #a5b4fc; }
    .level-btn.active { color: #fff; border-color: transparent; }

    .level-btn[data-level="TRACE"].active  { background: #6b7280; }
    .level-btn[data-level="DEBUG"].active  { background: #3b82f6; }
    .level-btn[data-level="INFO"].active   { background: #22c55e; }
    .level-btn[data-level="WARN"].active   { background: #f59e0b; }
    .level-btn[data-level="ERROR"].active  { background: #ef4444; }

    .send-btn {
      width: 100%;
      padding: 0.7rem;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    .send-btn:hover { background: #4f46e5; }
    .send-btn:disabled { background: #334155; color: #475569; cursor: not-allowed; }

    .result {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'Courier New', monospace;
      line-height: 1.5;
      display: none;
    }

    .result.success { background: #14532d33; border: 1px solid #166534; color: #86efac; }
    .result.error   { background: #7f1d1d33; border: 1px solid #991b1b; color: #fca5a5; }

    .history {
      margin-top: 1.5rem;
      border-top: 1px solid #1e293b;
      padding-top: 1rem;
    }

    .history h2 { font-size: 0.78rem; color: #475569; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1e293b;
      font-size: 0.8rem;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 1px;
    }

    .badge-TRACE { background:#374151; color:#d1d5db; }
    .badge-DEBUG { background:#1d4ed8; color:#bfdbfe; }
    .badge-INFO  { background:#15803d; color:#bbf7d0; }
    .badge-WARN  { background:#b45309; color:#fde68a; }
    .badge-ERROR { background:#b91c1c; color:#fecaca; }

    .log-msg { color: #cbd5e1; word-break: break-all; }
    .log-time { color: #475569; white-space: nowrap; font-size: 0.72rem; margin-top: 2px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Log Pipeline</h1>
  <p class="subtitle">spring boot → kafka → logstash → ES → kibana</p>

  <div class="field">
    <label>로그 레벨</label>
    <div class="level-row">
      <button class="level-btn" data-level="TRACE">TRACE</button>
      <button class="level-btn" data-level="DEBUG">DEBUG</button>
      <button class="level-btn active" data-level="INFO">INFO</button>
      <button class="level-btn" data-level="WARN">WARN</button>
      <button class="level-btn" data-level="ERROR">ERROR</button>
    </div>
  </div>

  <div class="field">
    <label for="message">로그 메시지</label>
    <textarea id="message" placeholder="로그 메시지를 입력하세요..."></textarea>
  </div>

  <button class="send-btn" id="sendBtn">전송</button>

  <div class="result" id="result"></div>

  <div class="history" id="historySection" style="display:none">
    <h2>전송 기록</h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
  let selectedLevel = 'INFO';

  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedLevel = btn.dataset.level;
    });
  });

  document.getElementById('sendBtn').addEventListener('click', async () => {
    const message = document.getElementById('message').value.trim();
    if (!message) {
      showResult('메시지를 입력해주세요.', false);
      return;
    }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = '전송 중...';

    try {
      const res = await fetch('/api/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ level: selectedLevel, message }),
      });

      const data = await res.json();

      if (res.ok) {
        showResult(`✓ 로그 전송 성공\n레벨: ${data.level} | 메시지: ${data.message}`, true);
        addHistory(selectedLevel, message);
        document.getElementById('message').value = '';
      } else {
        showResult(`✗ 오류: ${data.error || '알 수 없는 오류'}`, false);
      }
    } catch (e) {
      showResult(`✗ 네트워크 오류: ${e.message}`, false);
    } finally {
      btn.disabled = false;
      btn.textContent = '전송';
    }
  });

  function showResult(text, success) {
    const el = document.getElementById('result');
    el.textContent = text;
    el.className = 'result ' + (success ? 'success' : 'error');
    el.style.display = 'block';
  }

  function addHistory(level, message) {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    section.style.display = 'block';

    const now = new Date().toLocaleTimeString('ko-KR');
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `
      <span class="badge badge-${level}">${level}</span>
      <div style="flex:1">
        <div class="log-msg">${escapeHtml(message)}</div>
        <div class="log-time">${now}</div>
      </div>`;
    list.prepend(item);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
